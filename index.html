<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Running MVP</title>
</head>

<body>
  <h1>🏃 Running MVP</h1>

  <!-- 입력 -->
  <div>
    <input id="date" type="date" />
    <input id="distance" type="number" step="0.1" placeholder="km" />
    <input id="note" type="text" placeholder="메모" />
    <button onclick="addRun()">추가</button>
  </div>

  <hr />

  <!-- 요약 -->
  <div>
    <h3>📊 Summary</h3>
    <div id="summary">총 거리: 0 km</div>
  </div>

  <hr />

  <!-- 로그 리스트 -->
  <div>
    <h3>📋 Logs</h3>
    <div id="logs"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
